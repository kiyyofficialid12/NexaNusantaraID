package com.nexa.nusantara;

import android.content.Context;
import android.content.SharedPreferences;
import android.widget.Toast;
import android.net.Uri;
import android.content.Intent;

public class WhatsAppConnector {
    private static WhatsAppConnector instance;
    private Context context;
    private boolean isConnected = false;
    private String connectedNumber = "";
    private String sessionId = "";
    private SharedPreferences prefs;

    private WhatsAppConnector(Context context) {
        this.context = context;
        prefs = context.getSharedPreferences("wa_connector", Context.MODE_PRIVATE);
        isConnected = prefs.getBoolean("is_connected", false);
        connectedNumber = prefs.getString("connected_number", "");
        sessionId = prefs.getString("session_id", "");
    }

    public static synchronized WhatsAppConnector getInstance(Context context) {
        if (instance == null) instance = new WhatsAppConnector(context);
        return instance;
    }

    public boolean pairWithCode(String sender, String code) {
        if (!code.matches("WA-[0-9]{4}-[A-Z0-9]{8}")) {
            Toast.makeText(context, "Format kode salah!", Toast.LENGTH_SHORT).show();
            return false;
        }
        String last4 = sender.length() >= 4 ? sender.substring(sender.length() - 4) : "0000";
        String codeLast4 = code.substring(3, 7);
        if (!last4.equals(codeLast4)) {
            Toast.makeText(context, "❌ Kode tidak cocok!", Toast.LENGTH_LONG).show();
            return false;
        }
        try { Thread.sleep(1500); } catch (InterruptedException e) {}
        isConnected = true;
        connectedNumber = sender;
        sessionId = "SESSION-" + System.currentTimeMillis();
        prefs.edit().putBoolean("is_connected", true).putString("connected_number", sender).putString("session_id", sessionId).apply();
        return true;
    }

    public boolean sendMessage(String targetNumber, String message) {
        if (!isConnected) {
            Toast.makeText(context, "❌ Belum terhubung!", Toast.LENGTH_SHORT).show();
            return false;
        }
        try {
            String url = "https://wa.me/" + targetNumber + "?text=" + Uri.encode(message);
            Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
            context.startActivity(intent);
            return true;
        } catch (Exception e) {
            Toast.makeText(context, "Gagal kirim: " + e.getMessage(), Toast.LENGTH_SHORT).show();
            return false;
        }
    }

    public boolean isConnected() { return isConnected; }
    public String getConnectedNumber() { return connectedNumber; }
    public String getSessionId() { return sessionId; }
    public void disconnect() {
        isConnected = false; connectedNumber = ""; sessionId = "";
        prefs.edit().clear().apply();
        Toast.makeText(context, "🔌 Terputus.", Toast.LENGTH_SHORT).show();
    }
}
EOF

